name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  THEMIS_USE_MOCK_SPEECH: "true"

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test -p themis-core -p themis-ipc -p themis-azure

      - name: Build binaries
        run: cargo build --release -p themis-service -p themis-cli

  tray:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/themis-tray/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/themis-tray/package-lock.json

      - name: Install frontend deps
        working-directory: apps/themis-tray
        run: npm install

      - name: Build Tauri (no bundle in CI)
        working-directory: apps/themis-tray
        env:
          CI: "true"
        run: npm run tauri build -- --no-bundle
