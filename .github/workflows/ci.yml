name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  THEMIS_USE_MOCK_SPEECH: "true"
  RUST_BACKTRACE: 1

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Prepare macOS Tauri icons
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ICON_DIR=apps/themis-tray/src-tauri/icons
          mkdir -p "$ICON_DIR/icon.iconset"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_16x16.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_16x16@2x.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_32x32.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_32x32@2x.png"
          cp "$ICON_DIR/128x128.png" "$ICON_DIR/icon.iconset/icon_128x128.png"
          cp "$ICON_DIR/128x128.png" "$ICON_DIR/icon.iconset/icon_128x128@2x.png"
          cp "$ICON_DIR/256x256.png" "$ICON_DIR/icon.iconset/icon_256x256.png"
          cp "$ICON_DIR/256x256.png" "$ICON_DIR/icon.iconset/icon_512x512@2x.png"
          iconutil -c icns "$ICON_DIR/icon.iconset" -o "$ICON_DIR/icon.icns"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test -p themis-core -p themis-ipc -p themis-azure

      - name: Build binaries
        run: cargo build --release -p themis-service -p themis-cli

  tray:
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Prepare macOS Tauri icons
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ICON_DIR=apps/themis-tray/src-tauri/icons
          mkdir -p "$ICON_DIR/icon.iconset"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_16x16.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_16x16@2x.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_32x32.png"
          cp "$ICON_DIR/32x32.png" "$ICON_DIR/icon.iconset/icon_32x32@2x.png"
          cp "$ICON_DIR/128x128.png" "$ICON_DIR/icon.iconset/icon_128x128.png"
          cp "$ICON_DIR/128x128.png" "$ICON_DIR/icon.iconset/icon_128x128@2x.png"
          cp "$ICON_DIR/256x256.png" "$ICON_DIR/icon.iconset/icon_256x256.png"
          cp "$ICON_DIR/256x256.png" "$ICON_DIR/icon.iconset/icon_512x512@2x.png"
          iconutil -c icns "$ICON_DIR/icon.iconset" -o "$ICON_DIR/icon.icns"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/themis-tray/package-lock.json

      - name: Install frontend deps and build dist
        working-directory: apps/themis-tray
        run: |
          npm ci
          npm run build

      - name: Build tray (Rust / Tauri, no installer bundle)
        env:
          CI: "true"
        run: cargo build --release -p themis-tray
