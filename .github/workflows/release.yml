name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  THEMIS_USE_MOCK_SPEECH: "true"
  # CI-only: thin LTO + parallel codegen — much faster links (esp. Windows MSVC)
  # with negligible runtime/size impact for desktop binaries.
  CARGO_PROFILE_RELEASE_LTO: thin
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bundles: nsis
            rustflags: "-C link-arg=-fuse-ld=lld-link"
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
            bundles: dmg
            rustflags: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            bundles: dmg
            rustflags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Single cargo build step; cache workspace + target/${{ matrix.target }}.
          shared-key: release-${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/themis-tray/package-lock.json

      - name: Prepare macOS Tauri icons
        if: runner.os == 'macOS'
        run: bash scripts/prepare-macos-icons.sh

      - name: Build frontend
        working-directory: apps/themis-tray
        run: |
          npm ci
          npm run icons
          npm run build

      - name: Build Rust release binaries
        run: cargo build --release -p themis-service -p themis-cli --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Bundle Tauri installers
        working-directory: apps/themis-tray
        shell: bash
        run: |
          cargo clean -p themis-tray --target ${{ matrix.target }}
          npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config "$(cat ../../scripts/tauri-release-build.json)"
        env:
          CI: "true"
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release-assets.sh "${{ matrix.target }}" "${{ matrix.name }}" --flat-names

      - name: Package release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release-assets.ps1 -Target "${{ matrix.target }}" -Name "${{ matrix.name }}" -FlatNames

      - uses: actions/upload-artifact@v4
        with:
          name: themis-${{ matrix.name }}
          path: |
            release-assets/${{ matrix.name }}/
            release-assets/Themis-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release upload
        shell: bash
        run: |
          mkdir -p release-upload
          find artifacts -name 'Themis-*.zip' -exec cp {} release-upload/ \;
          cp packaging/RELEASE-INDEX.md release-upload/README.md
          echo "Uploading:"
          ls -la release-upload/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          body_path: packaging/RELEASE-INDEX.md
          generate_release_notes: true
