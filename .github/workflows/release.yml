name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  THEMIS_USE_MOCK_SPEECH: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build Rust release
        run: |
          cargo build --release -p themis-service -p themis-cli --target ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare macOS Tauri icons
        if: runner.os == 'macOS'
        run: bash scripts/prepare-macos-icons.sh

      - name: Build Tauri bundle
        working-directory: apps/themis-tray
        run: |
          npm install
          npm run icons
          npm run tauri build -- --target ${{ matrix.target }}
        env:
          CI: "true"

      - name: Package release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release-assets.sh "${{ matrix.target }}" "${{ matrix.name }}"

      - name: Package release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release-assets.ps1 -Target "${{ matrix.target }}" -Name "${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: themis-${{ matrix.name }}
          path: release-assets/${{ matrix.name }}/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p release-upload
          find artifacts -type f \
            ! -name '*.zip' \
            ! -name '*.tar.gz' \
            ! -name '*.sig' \
            -exec cp {} release-upload/ \;
          echo "Uploading:"
          ls -la release-upload/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          generate_release_notes: true
