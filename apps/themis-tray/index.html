<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Themis Overlay</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="overlay">
      <header class="overlay-header">
        <span class="brand">Themis</span>
        <button
          type="button"
          id="scroll-latest"
          class="scroll-latest hidden"
          title="Jump to latest transcript"
        >
          ↓ Latest
        </button>
      </header>
      <p id="status" class="status-line">Connecting…</p>
      <div id="transcript-scroll" class="transcript-scroll" aria-live="polite">
        <div id="transcript" class="transcript-body"></div>
      </div>
      <div id="feedback" class="feedback-line"></div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
