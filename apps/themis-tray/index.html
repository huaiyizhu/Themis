<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Themis Overlay</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/config-status.css" />
    <link rel="stylesheet" href="/capture-status.css" />
  </head>
  <body>
    <div
      id="mini-floater"
      class="mini-floater hidden"
      role="button"
      tabindex="0"
      aria-label="Themis 桌面浮标，点击恢复窗口"
    >
      <span class="mini-floater-icon" aria-hidden="true">⚖</span>
    </div>
    <div id="overlay" class="theme-dark-glass">
      <div class="resize-layer" aria-hidden="true">
        <div class="resize-edge resize-n" data-tauri-resize="north"></div>
        <div class="resize-edge resize-s" data-tauri-resize="south"></div>
        <div class="resize-edge resize-e" data-tauri-resize="east"></div>
        <div class="resize-edge resize-w" data-tauri-resize="west"></div>
        <div class="resize-edge resize-ne" data-tauri-resize="northeast"></div>
        <div class="resize-edge resize-nw" data-tauri-resize="northwest"></div>
        <div class="resize-edge resize-se" data-tauri-resize="southeast"></div>
        <div class="resize-edge resize-sw" data-tauri-resize="southwest"></div>
      </div>

      <header id="drag-handle" class="overlay-header" data-tip="拖动标题栏移动窗口">
        <div class="header-left">
          <span class="brand">Themis</span>
          <span id="theme-badge" class="theme-badge" data-tip="主题与字号">dark</span>
        </div>
        <div class="header-actions">
          <button type="button" id="toggle-capture" class="header-btn capture-btn">捕捉</button>
          <button type="button" id="toggle-diagnose" class="header-btn diagnose-btn" aria-pressed="false">诊断</button>
          <button type="button" id="toggle-localize" class="header-btn localize-btn is-localized" aria-pressed="true">中文</button>
          <button type="button" id="toggle-mini" class="header-btn mini-toggle">浮</button>
          <div class="size-presets" id="size-presets">
            <button type="button" id="size-toggle" class="header-btn size-toggle" aria-expanded="false" aria-haspopup="true">尺寸</button>
            <div id="size-menu" class="size-menu hidden" role="menu" aria-label="窗口尺寸"></div>
          </div>
          <button type="button" id="clear-session" class="header-btn clear-session">清空</button>
          <button type="button" id="hide-overlay" class="header-btn hide-window">隐藏</button>
          <button type="button" id="quit-app" class="header-btn quit-btn">退出</button>
          <button type="button" id="scroll-latest" class="header-btn scroll-latest hidden">↓ Latest</button>
        </div>
      </header>
      <p id="status" class="status-line">Connecting…</p>
      <p id="config-status" class="config-status-line">配置检查…</p>
      <section id="summary-panel" class="summary-panel" aria-label="Full session summary">
        <h2 class="summary-title">全文总结</h2>
        <p id="summary-empty" class="summary-empty">采集中，摘要将约每 20 秒根据全文已知内容更新…</p>
        <div id="summary-text" class="summary-text hidden"></div>
      </section>
      <div class="layout-body" id="layout-body">
        <div class="middle-row" id="middle-row">
          <aside id="questions-panel" class="questions-panel" aria-label="Questions">
            <h2 class="questions-title">Questions</h2>
            <p id="questions-empty" class="questions-empty">核心问题会实时显示在此栏，无需滚动即可查看。</p>
            <div id="questions-list" class="question-cards"></div>
          </aside>
          <div
            id="middle-divider"
            class="middle-divider"
            role="separator"
            aria-orientation="vertical"
            aria-label="Resize questions and terms panels"
          ></div>
          <aside id="insights-panel" class="insights-panel" aria-label="Keywords and terms">
            <h2 class="insights-title">Terms</h2>
            <p id="insights-empty" class="insights-empty">Keywords and terms appear here after each phrase.</p>
            <section id="insights-keywords" class="insights-section collapsible hidden">
              <button
                type="button"
                id="keywords-toggle"
                class="section-toggle"
                aria-expanded="true"
                aria-controls="insights-keywords-body"
              >
                <span class="section-toggle-label">Keywords</span>
                <span id="keywords-count" class="section-toggle-count"></span>
                <span class="section-toggle-chevron" aria-hidden="true"></span>
              </button>
              <div id="insights-keywords-body" class="section-body">
                <div id="insights-keywords-list" class="tag-list"></div>
              </div>
            </section>
            <section id="insights-terms" class="insights-section hidden">
              <h3>Terms</h3>
              <div id="insights-terms-list" class="insight-cards"></div>
            </section>
          </aside>
        </div>
        <div id="transcript-block" class="transcript-block">
          <div class="transcript-bar">
            <button
              type="button"
              id="toggle-transcript"
              class="transcript-toggle-h"
              aria-label="隐藏实时字幕"
              aria-pressed="false"
            >
              ▾
            </button>
            <span class="transcript-bar-label">实时字幕</span>
          </div>
          <div
            id="stack-divider"
            class="stack-divider"
            role="separator"
            aria-orientation="horizontal"
            aria-label="Resize transcript panel"
          ></div>
          <div id="transcript-section" class="transcript-section">
            <div id="transcript-scroll" class="transcript-scroll" aria-live="polite">
              <div id="transcript" class="transcript-body"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
