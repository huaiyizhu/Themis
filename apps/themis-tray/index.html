<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Themis Overlay</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/config-status.css" />
    <link rel="stylesheet" href="/capture-status.css" />
    <link rel="stylesheet" href="/ui-modes.css" />
  </head>
  <body class="ui-mode-meeting">
    <div
      id="mini-floater"
      class="mini-floater hidden"
      role="button"
      tabindex="0"
      aria-label="Themis 桌面浮标，点击恢复窗口"
    >
      <img class="mini-floater-mark" src="/mini-floater-mark.svg" alt="" draggable="false" />
    </div>
    <div id="overlay" class="theme-dark-glass">
      <header id="drag-handle" class="overlay-header header-compact" data-tip="拖动标题栏移动窗口">
        <div class="header-compact-row">
          <div class="header-brand-block">
            <span class="brand">Themis</span>
            <span id="theme-badge" class="theme-badge hidden" data-tip="主题与样式" hidden>dark</span>
          </div>
          <div class="ui-mode-switch" role="group" aria-label="界面模式">
            <button type="button" class="ui-mode-btn is-active" data-ui-mode="meeting" aria-pressed="true">
              开会
            </button>
            <button type="button" class="ui-mode-btn" data-ui-mode="glance" aria-pressed="false">看课</button>
          </div>
          <span class="header-compact-spacer" aria-hidden="true"></span>
          <button type="button" id="toggle-capture" class="header-btn capture-btn">捕捉</button>
          <button type="button" id="toggle-mini" class="header-btn mini-toggle">浮</button>
          <button
            type="button"
            id="toggle-topmost"
            class="header-btn topmost-btn header-btn-icon is-topmost"
            aria-label="窗口置顶"
            aria-pressed="true"
          >
            <svg class="topmost-pin-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v7h1.6v-7H18v-2l-2-2z"
                fill="currentColor"
              />
            </svg>
          </button>
          <div class="header-overflow-wrap">
            <button
              type="button"
              id="header-overflow-toggle"
              class="header-btn overflow-toggle"
              aria-expanded="false"
              aria-haspopup="true"
            >
              ⋯
            </button>
            <div id="header-overflow-menu" class="header-overflow-menu hidden" role="menu" aria-label="更多操作">
              <button type="button" id="toggle-diagnose" class="header-btn diagnose-btn" aria-pressed="false">诊断</button>
              <button type="button" id="toggle-settings" class="header-btn settings-btn" aria-pressed="false">配置</button>
              <button type="button" id="toggle-localize" class="header-btn localize-btn is-localized" aria-pressed="true">
                中文
              </button>
              <button type="button" id="clear-session" class="header-btn clear-session">清空</button>
              <div class="header-segment" role="group" aria-label="窗口透明度">
                <span class="header-segment-label" aria-hidden="true">透</span>
                <button type="button" id="opacity-down" class="header-segment-step" aria-label="降低透明度">−</button>
                <button type="button" id="opacity-up" class="header-segment-step" aria-label="提高透明度">+</button>
              </div>
              <div class="header-segment" role="group" aria-label="文字大小">
                <span class="header-segment-label" aria-hidden="true">字</span>
                <button type="button" id="font-down" class="header-segment-step" aria-label="缩小字号">−</button>
                <button type="button" id="font-up" class="header-segment-step" aria-label="放大字号">+</button>
                <button type="button" id="font-reset" class="header-segment-step header-segment-reset" aria-label="重置字号">
                  ↺
                </button>
              </div>
              <div class="size-presets" id="size-presets">
                <button type="button" id="size-toggle" class="header-btn size-toggle" aria-expanded="false" aria-haspopup="true">
                  尺寸
                </button>
                <div id="size-menu" class="size-menu hidden" role="menu" aria-label="窗口尺寸"></div>
              </div>
              <button type="button" id="hide-overlay" class="header-btn hide-window">隐藏</button>
              <button type="button" id="quit-app" class="header-btn quit-btn">退出</button>
            </div>
          </div>
          <button type="button" id="scroll-latest" class="header-btn scroll-latest hidden">↓ 最新</button>
        </div>
      </header>
      <p id="status" class="status-line">Connecting…</p>
      <p id="config-status" class="config-status-line">配置检查…</p>

      <section id="summary-panel" class="summary-panel is-collapsed" aria-label="会话摘要">
        <button type="button" id="summary-toggle" class="summary-toggle-bar" aria-expanded="false">
          <span class="summary-toggle-label">会话摘要</span>
          <span id="summary-hint">采集中，摘要将周期性更新…</span>
          <span class="summary-chevron" aria-hidden="true"></span>
        </button>
        <div id="summary-body" class="summary-body">
          <p id="summary-empty" class="summary-empty hidden">暂无摘要</p>
          <div id="summary-text" class="summary-text hidden"></div>
          <div id="summary-actions" class="summary-actions hidden">
            <button type="button" id="summary-copy" class="insight-more-btn summary-copy-btn" disabled>
              复制
            </button>
          </div>
        </div>
      </section>

      <section id="glance-panel" class="glance-panel" aria-label="看课术语" hidden>
        <div id="glance-primary" class="glance-primary-card">
          <p class="glance-empty">听写识别到术语后会显示在此</p>
        </div>
        <div id="glance-prev" class="glance-prev-row hidden" role="button" tabindex="0"></div>
      </section>

      <div class="layout-body" id="layout-body">
        <div class="middle-row" id="middle-row">
          <aside id="questions-panel" class="questions-panel" aria-label="当前问题">
            <h2 class="questions-title">当前问题</h2>
            <p id="questions-empty" class="questions-empty">检测到技术问句时，会给出简答；可 📌 固定到底部栏回看。</p>
            <div id="questions-list" class="question-cards"></div>
          </aside>
          <div
            id="middle-divider"
            class="middle-divider"
            role="separator"
            aria-orientation="vertical"
            aria-label="调整问题与术语栏宽度"
          ></div>
          <aside id="insights-panel" class="insights-panel" aria-label="术语">
            <h2 class="insights-title">术语</h2>
            <p id="insights-empty" class="insights-empty">识别到术语后会显示扫盲说明；可 📌 固定、进阶或标记已懂。</p>
            <div id="insights-terms-list" class="insight-cards"></div>
          </aside>
        </div>
        <div id="transcript-block" class="transcript-block">
          <div class="transcript-bar">
            <button
              type="button"
              id="toggle-transcript"
              class="transcript-toggle-h"
              aria-label="显示实时字幕"
              aria-pressed="true"
            >
              ▴
            </button>
            <span class="transcript-bar-label">实时字幕</span>
          </div>
          <div
            id="stack-divider"
            class="stack-divider"
            role="separator"
            aria-orientation="horizontal"
            aria-label="调整字幕区高度"
          ></div>
          <div id="transcript-section" class="transcript-section">
            <div id="transcript-scroll" class="transcript-scroll" aria-live="polite">
              <div id="transcript" class="transcript-body"></div>
            </div>
          </div>
        </div>
      </div>

      <section id="pinned-panel" class="pinned-panel is-collapsed" aria-label="已固定">
        <button type="button" id="pinned-toggle" class="pinned-toggle-bar" aria-expanded="false">
          <span class="pinned-toggle-label">📌 已固定</span>
          <span id="pinned-hint">固定术语或问题，便于当场查看与会后回看</span>
          <span class="pinned-chevron" aria-hidden="true"></span>
        </button>
        <div id="pinned-body" class="pinned-body">
          <p id="pinned-empty" class="pinned-empty">点击术语或问题上的「📌 固定」加入底部；可扫盲/进阶、复制、展开更详细</p>
          <div id="pinned-list" class="pinned-list"></div>
        </div>
      </section>

      <div class="resize-layer" aria-hidden="true">
        <div class="resize-edge resize-n" data-tauri-resize="north"></div>
        <div class="resize-edge resize-s" data-tauri-resize="south"></div>
        <div class="resize-edge resize-e" data-tauri-resize="east"></div>
        <div class="resize-edge resize-w" data-tauri-resize="west"></div>
        <div class="resize-edge resize-ne" data-tauri-resize="northeast"></div>
        <div class="resize-edge resize-nw" data-tauri-resize="northwest"></div>
        <div class="resize-edge resize-se" data-tauri-resize="southeast"></div>
        <div class="resize-edge resize-sw" data-tauri-resize="southwest"></div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
