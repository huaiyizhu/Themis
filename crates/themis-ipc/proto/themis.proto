syntax = "proto3";

package themis.v1;

service ThemisService {
  rpc StartCapture(StartCaptureRequest) returns (StartCaptureResponse);
  rpc StopCapture(StopCaptureRequest) returns (StopCaptureResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetDiagnostics(GetDiagnosticsRequest) returns (GetDiagnosticsResponse);
  rpc ResetSession(ResetSessionRequest) returns (ResetSessionResponse);
  rpc ExpandInsight(ExpandInsightRequest) returns (ExpandInsightResponse);
  rpc SubscribeTranscripts(SubscribeTranscriptsRequest)
      returns (stream TranscriptMessage);
}

message StartCaptureRequest {}

message StartCaptureResponse {
  bool ok = 1;
  string message = 2;
}

message StopCaptureRequest {}

message StopCaptureResponse {
  bool ok = 1;
  string message = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  string state = 1;
  string message = 2;
  uint64 transcripts_received = 3;
  /// Recent PCM peak (0–32767) from loopback capture.
  uint32 audio_peak = 4;
  /// Audio frames received since service start / last reset.
  uint64 audio_frames = 5;
  /// Capture backend: process | endpoint | process+endpoint
  string capture_mode = 6;
  /// Active Windows audio sessions (process loopback).
  uint32 audio_sessions = 7;
  string capture_detail = 8;
  ConfigStatus service_config = 9;
}

message ConfigStatus {
  bool stt_configured = 1;
  string stt_mode = 2;
  bool llm_configured = 3;
  string speech_region = 4;
  string foundry_deployment = 5;
  bool analysis_enabled = 6;
}

message SubscribeTranscriptsRequest {}

message TranscriptMessage {
  string text = 1;
  bool is_final = 2;
  string feedback = 3;
  int64 timestamp_unix_ms = 4;
  LatencyBreakdown latency = 5;
  /// JSON: AnalysisResult (keywords, terms, questions)
  string insights_json = 6;
  /// Rolling full-session summary (简体中文)
  string session_summary = 7;
}

message GetDiagnosticsRequest {}

message ResetSessionRequest {}

message ResetSessionResponse {
  bool ok = 1;
  string message = 2;
}

message ExpandInsightRequest {
  /// "term" or "question"
  string kind = 1;
  string subject = 2;
  string brief = 3;
}

message ExpandInsightResponse {
  bool ok = 1;
  string detail = 2;
  string message = 3;
}

message GetDiagnosticsResponse {
  repeated LatencyRecord records = 1;
  LatencySummary summary = 2;
  AnalysisDiagnosticsSummary analysis_summary = 3;
  repeated AnalysisInsightRecord analysis_records = 4;
  ConfigStatus service_config = 5;
}

message AnalysisDiagnosticsSummary {
  uint32 count = 1;
  bool llm_configured = 2;
  string last_llm_status = 3;
}

message AnalysisInsightRecord {
  uint64 id = 1;
  string text = 2;
  int64 emitted_unix_ms = 3;
  string heuristic_json = 4;
  string llm_json = 5;
  string merged_json = 6;
  bool llm_configured = 7;
  string llm_status = 8;
  uint32 heuristic_ms = 9;
  uint32 llm_ms = 10;
}

message LatencyBreakdown {
  uint32 buffer_ms = 1;
  uint32 azure_ms = 2;
  uint32 stt_wall_ms = 3;
  uint32 estimated_e2e_ms = 4;
  string language = 5;
}

message LatencyRecord {
  uint64 id = 1;
  string text = 2;
  bool is_final = 3;
  int64 emitted_unix_ms = 4;
  LatencyBreakdown breakdown = 5;
}

message LatencySummary {
  uint32 count = 1;
  uint32 avg_azure_ms = 2;
  uint32 avg_e2e_ms = 3;
  uint32 max_e2e_ms = 4;
  uint32 last_azure_ms = 5;
}
