syntax = "proto3";

package themis.v1;

service ThemisService {
  rpc StartCapture(StartCaptureRequest) returns (StartCaptureResponse);
  rpc StopCapture(StopCaptureRequest) returns (StopCaptureResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc GetDiagnostics(GetDiagnosticsRequest) returns (GetDiagnosticsResponse);
  rpc SubscribeTranscripts(SubscribeTranscriptsRequest)
      returns (stream TranscriptMessage);
}

message StartCaptureRequest {}

message StartCaptureResponse {
  bool ok = 1;
  string message = 2;
}

message StopCaptureRequest {}

message StopCaptureResponse {
  bool ok = 1;
  string message = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  string state = 1;
  string message = 2;
  uint64 transcripts_received = 3;
  /// Recent PCM peak (0–32767) from loopback capture.
  uint32 audio_peak = 4;
  /// Audio frames received since service start / last reset.
  uint64 audio_frames = 5;
  /// Capture backend: process | endpoint | process+endpoint
  string capture_mode = 6;
  /// Active Windows audio sessions (process loopback).
  uint32 audio_sessions = 7;
  string capture_detail = 8;
}

message SubscribeTranscriptsRequest {}

message TranscriptMessage {
  string text = 1;
  bool is_final = 2;
  string feedback = 3;
  int64 timestamp_unix_ms = 4;
  LatencyBreakdown latency = 5;
  /// JSON: AnalysisResult (keywords, terms, questions)
  string insights_json = 6;
}

message GetDiagnosticsRequest {}

message GetDiagnosticsResponse {
  repeated LatencyRecord records = 1;
  LatencySummary summary = 2;
}

message LatencyBreakdown {
  uint32 buffer_ms = 1;
  uint32 azure_ms = 2;
  uint32 stt_wall_ms = 3;
  uint32 estimated_e2e_ms = 4;
  string language = 5;
}

message LatencyRecord {
  uint64 id = 1;
  string text = 2;
  bool is_final = 3;
  int64 emitted_unix_ms = 4;
  LatencyBreakdown breakdown = 5;
}

message LatencySummary {
  uint32 count = 1;
  uint32 avg_azure_ms = 2;
  uint32 avg_e2e_ms = 3;
  uint32 max_e2e_ms = 4;
  uint32 last_azure_ms = 5;
}
